gui:
  theme:
    selectedLineBgColor:
      - "#E3D794"
  language: "zh-TW"
  showIcons: true
os:
  open: "open {{filename}}"
  editPreset: "nvim"
confirmOnQuit: false
git:
  pagers:
    - externalDiffCommand: difft --color=always
    - useExternalDiffGitConfig: true
customCommands:
  - key: "w"
    prompts:
      - type: "input"
        title: "Commit"
        initialValue: "WIP"
    command: git commit -m "{{index .PromptResponses 0}}" --no-verify
    context: "files"
    description: "Commit message without verify"
  - key: "A"
    command: git commit --amend {{.Form.V}} --no-edit
    prompts:
      - type: "menu"
        title: "Need verify ?"
        key: "V"
        options:
          - value: " "
            name: "Verify"
          - value: --no-verify
            name: "Skip"
    context: "files"
    description: "Amend commit"
  - key: "<c-p>"
    command: git cherry-pick -x {{.SelectedSubCommit.Sha}}
    prompts:
      - type: "confirm"
        title: "Cherry-pick {{.SelectedSubCommit.Name}} ?"
    context: "subCommits"
    description: "Cherry-pick commit with sha"
  - key: "F"
    context: remotes
    command: "git fetch --prune origin --verbose"
    description: "Fetch remote branches"
  - key: "U"
    command: "git submodule update --remote --merge"
    context: "submodules"
    description: "Update submodules to remote"
  # Create worktree from current branch (when in worktrees view)
  - key: "N"
    context: "worktrees"
    description: "Create new worktree from current branch"
    prompts:
      - type: "input"
        title: "Create a new worktree from {{ .CheckedOutBranch.Name }} with what name?"
        key: "Name"
        initialValue: ""
      - type: "input"
        title: "Worktree folder path?"
        key: "Path"
        initialValue: '{{ runCommand "sh -c \"git worktree list --porcelain | sed -n ''1s/^worktree //p''\"" }}/.worktree/{{ runCommand (printf "basename %s" (.Form.Name | quote)) }}'
    command: "git worktree add {{ .Form.Path | quote }} {{ .CheckedOutBranch.Name }} -b {{ .Form.Name | quote }}"
  # Create worktree from selected branch (when in branches view)
  - key: "N"
    context: "localBranches"
    description: "Create new worktree from selected branch"
    prompts:
      - type: "input"
        title: "Create a new worktree from {{ .SelectedLocalBranch.Name }} with what name?"
        key: "Name"
        initialValue: ""
      - type: "input"
        title: "Worktree folder path?"
        key: "Path"
        initialValue: '{{ runCommand "sh -c \"git worktree list --porcelain | sed -n ''1s/^worktree //p''\"" }}/.worktree/{{ runCommand (printf "basename %s" (.Form.Name | quote)) }}'
    command: "git worktree add {{ .Form.Path | quote }} {{ .SelectedLocalBranch.Name | quote }} -b {{ .Form.Name | quote }}"
  - key: "D"
    context: "localBranches"
    description: "Delete worktree and branch"
    prompts:
      - type: "confirm"
        title: "Delete worktree + branch: {{ .SelectedLocalBranch.Name }}?"
        body: "This will remove the worktree (if exists) and force-delete the branch."
    command: >-
      WT_PATH=$(git worktree list --porcelain | awk -v b="refs/heads/{{ .SelectedLocalBranch.Name }}" '/^worktree /{p=$0} /^branch /{if($2==b){print p}}' | sed 's/worktree //');
      if [ -n "$WT_PATH" ]; then git worktree remove "$WT_PATH" --force; fi;
      git branch -D {{ .SelectedLocalBranch.Name | quote }}
  - key: "N"
    context: "remoteBranches"
    description: "Create new worktree from selected remote branch"
    prompts:
      - type: "input"
        title: "Create a new worktree from {{ .SelectedRemoteBranch.RemoteName }}/{{ .SelectedRemoteBranch.Name }} with what name?"
        key: "Name"
        initialValue: "{{ .SelectedRemoteBranch.Name }}"
      - type: "input"
        title: "Worktree folder path?"
        key: "Path"
        initialValue: '{{ runCommand "sh -c \"git worktree list --porcelain | sed -n ''1s/^worktree //p''\"" }}/.worktree/{{ runCommand (printf "basename %s" (.Form.Name | quote)) }}'
    command: "git worktree add {{ .Form.Path | quote }} {{ .SelectedRemoteBranch.RemoteName }}/{{ .SelectedRemoteBranch.Name | quote }} -b {{ .Form.Name | quote }}"
